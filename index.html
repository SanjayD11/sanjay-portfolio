<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="icon" id="favicon" type="image/svg+xml" href="/favicon-dark.svg" />
  <title>Sanjay Dharmarajou – Portfolio</title>
  <meta name="description"
    content="Portfolio of Sanjay Dharmarajou – Logic-Driven Coder, Java Developer, Automation & AI Enthusiast" />
  <meta name="author" content="Sanjay Dharmarajou" />
  <meta property="og:title" content="Sanjay Dharmarajou – Portfolio" />
  <meta property="og:description" content="Logic-Driven Coder | Java Developer | Automation & AI Enthusiast" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@SanjayD11" />
  <meta name="twitter:image" content="/og-image.png" />
  <script>
    // Restore theme + set matching favicon before paint
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') { t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light' }
      document.documentElement.classList.toggle('dark', t === 'dark');
      // Set favicon to match theme
      window.__setFavicon = function (isDark) {
        var el = document.getElementById('favicon');
        if (el) el.href = isDark ? '/favicon-dark.svg' : '/favicon-light.svg';
      };
      window.__setFavicon(t === 'dark');
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
